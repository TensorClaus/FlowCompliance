name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'

jobs:
  ci:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          # Match the identity hardcoded in apps/api/vitest.config.ts so the
          # api integration tests run against the service without divergence
          # between local (docker) and CI databases.
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: simplifi_test
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Lint ────────────────────────────────────────────────────────────────
      - name: Lint
        run: pnpm lint

      # ── Database schema ──────────────────────────────────────────────────────
      # The api integration tests (event store, RLS, signing) run against a
      # real Postgres and need the full migration history, including the
      # simplifi_app RLS role the migrations self-provision.
      - name: Migrate test database
        run: pnpm --filter @simplifi/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/simplifi_test

      # ── Typecheck ───────────────────────────────────────────────────────────
      - name: Typecheck
        run: pnpm typecheck

      # ── Test + coverage ─────────────────────────────────────────────────────
      # Run per-package so each package's coverage threshold is enforced
      # individually. Dedicated test:coverage scripts avoid pnpm's
      # version-dependent extra-arg passthrough (pnpm 9 rejected --coverage;
      # `-- --coverage` on pnpm 10 forwards a literal "--" and silently
      # disables coverage).
      - name: Test (shared)
        run: pnpm --filter @simplifi/shared test:coverage

      - name: Test (api)
        run: pnpm --filter @simplifi/api test:coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/simplifi_test
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-test-session-secret-must-be-at-least-32-chars

      - name: Test (web)
        run: pnpm --filter @simplifi/web test:coverage

  e2e:
    name: E2E (Playwright)
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_test
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @simplifi/web exec playwright install --with-deps chromium

      - name: Migrate test database
        run: pnpm --filter @simplifi/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_test

      - name: Start API server
        run: pnpm --filter @simplifi/api start &
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_test
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-test-session-secret-must-be-at-least-32-chars

      - name: Start Vite dev server
        run: pnpm --filter @simplifi/web dev &
        env:
          VITE_API_TARGET: http://localhost:3001

      - name: Wait for API
        run: until curl -sf http://localhost:3001/health; do sleep 1; done
        timeout-minutes: 2

      - name: Wait for Vite
        run: until curl -sf http://localhost:5173; do sleep 1; done
        timeout-minutes: 2

      - name: Run E2E tests
        run: pnpm --filter @simplifi/web exec playwright test
        env:
          PLAYWRIGHT_API_URL: http://localhost:3001
          VITE_APP_URL: http://localhost:5173

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
