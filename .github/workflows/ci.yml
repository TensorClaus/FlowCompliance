name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  ci:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_test
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Lint ────────────────────────────────────────────────────────────────
      - name: Lint
        run: pnpm lint

      # ── Typecheck ───────────────────────────────────────────────────────────
      - name: Typecheck
        run: pnpm typecheck

      # ── Test + coverage ─────────────────────────────────────────────────────
      # Run per-package so each package's 80% threshold is enforced individually.
      # Stub env vars satisfy config.ts Zod validation without a real DB/Redis.
      - name: Test (shared)
        run: pnpm --filter @simplifi/shared test --coverage

      - name: Test (api)
        run: pnpm --filter @simplifi/api test --coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_test
          REDIS_URL: redis://localhost:6379

      - name: Test (web)
        run: pnpm --filter @simplifi/web test --coverage
